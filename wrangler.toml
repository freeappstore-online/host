name = "freeappstore-host"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = false

# Catches every subdomain under freeappstore.online. The wildcard DNS record
# + wildcard SSL cert on the zone is what makes this scale to thousands of
# apps without provisioning per-app DNS or domain bindings.
[[routes]]
pattern = "*.freeappstore.online/*"
zone_name = "freeappstore.online"

# Custom domain for AgentCoder app — served from the same R2 bucket,
# resolved via D1 routes row (slug=agentcoder, zone=space).
[[routes]]
pattern = "agentcoder.space/*"
zone_name = "agentcoder.space"

[[routes]]
pattern = "www.agentcoder.space/*"
zone_name = "agentcoder.space"

# `*.progamestore.online/*` was removed 2026-05-28 (PLAN-ARCH-CLEANUP follow-up).
# The FAS host worker has no code paths for the PGS zone — legacyProjectName()
# returns null for it. The wildcard was returning misleading "no app registered
# at <pgs subdomain>" 404s for unbound PGS hostnames. Published PGS games have
# their own per-game Worker routes or CF Pages custom-domain bindings.
# Unbound subdomains now correctly return CF's standard 5xx instead.
# If PGS adopts Path B, build a dedicated pgs/host/ Worker — do not re-add this
# cross-store route.

# Apex stays on the storefront's CF Pages project — this worker only handles
# subdomains. (No route for "freeappstore.online/*".)

[[r2_buckets]]
binding = "APPS"
bucket_name = "fas-apps"

# Service binding to the backend Worker. The catch-all *.freeappstore.online/*
# route preempts api.freeappstore.online's own Worker custom_domain binding,
# so this Worker has to explicitly dispatch api.* traffic to the backend.
# Worker-to-worker service binding bypasses the public network entirely.
[[services]]
binding = "API"
service = "freeappstore-api"

# Service binding to the KB host Worker. Same wildcard preemption issue —
# docs.freeappstore.online and kb.freeappstore.online are dispatched here.
[[services]]
binding = "KB"
service = "freeappstore-kb-host"

# Reuses the existing fas D1 database (same one admin uses). The new `routes`
# table lives alongside whatever else is in there; the schema is in
# migrations/0001_create_routes.sql.
[[d1_databases]]
binding = "DB"
database_name = "fas"
database_id = "a32701c0-5a56-4a12-810d-485166202e39"
migrations_dir = "migrations"
